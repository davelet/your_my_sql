<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You My SQL - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .splash-content {
            text-align: center;
            color: white;
            animation: fadeIn 0.5s ease-in;
        }

        .splash-logo {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .splash-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 1rem 0 0.5rem 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .splash-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
            margin: 0;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            margin: 2rem auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 2px;
            animation: progress 1s ease-out;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="splash-content">
        <div class="splash-logo">
            <div class="loading-spinner"></div>
        </div>
        <h1 class="splash-title">You My SQL</h1>
        <p class="splash-subtitle">Initializing...</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        
        // Wait for minimum splash time and initialization
        setTimeout(async () => {
            try {
                await invoke('close_splashscreen');
            } catch (error) {
                console.error('Failed to close splashscreen:', error);
                // Fallback: close window directly if command fails
                window.close();
            }
        }, 500); // Show splash for 0.5 seconds
    </script>
</body>
</html>
